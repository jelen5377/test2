<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyza Textu a URL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <section class="panel">
      <p class="eyebrow">GitHub Pages verze</p>
      <h1>Analyza stranky nebo textu</h1>
      <p class="intro">
        Aplikace vypise 10 nejcastejsich slov. Na GitHub Pages funguje spolehlive pro rucne vlozeny text a u nekterych webu umi nacist i URL, pokud to dany web povoli pres CORS.
      </p>

      <form id="url-form" class="form">
        <label for="url-input">URL stranky</label>
        <div class="row">
          <input
            id="url-input"
            name="url"
            type="url"
            placeholder="https://example.com/clanek"
          >
          <button type="button" id="fetch-button">Zkusit nacist URL</button>
        </div>
      </form>

      <form id="text-form" class="form text-form">
        <label for="text-input">Obsah stranky nebo libovolny text</label>
        <textarea
          id="text-input"
          name="text"
          rows="12"
          placeholder="Vloz text stranky sem. Pokud nacitani URL neprojde, zkopiruj sem obsah clanku nebo text z webu."
          required
        ></textarea>
        <button type="submit">Analyzovat text</button>
      </form>

      <div class="status">
        <span id="status-text">Pripraveno.</span>
      </div>

      <article class="result">
        <h2>Top 10 slov</h2>
        <ol id="summary-output" class="words-list">
          <li>Tady se zobrazi vysledek analyzy.</li>
        </ol>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
